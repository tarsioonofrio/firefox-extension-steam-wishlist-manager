<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rediscover Queue</title>
  <link rel="stylesheet" href="queue.css">
</head>
<body>
  <main class="container">
    <header class="top">
      <div class="top-title-row">
        <h1>Rediscover Queue</h1>
        <button id="go-btn" type="button">Go!</button>
        <div id="queue-header-bar" class="queue-header-bar hidden">
          <div class="queue-topbar-left">
            <div id="queue-nav" class="queue-nav hidden">
              <button id="prev-btn" type="button">Previous</button>
              <button id="next-btn" type="button">Next</button>
            </div>
          </div>
          <div class="queue-topbar-right">
            <a id="game-link" class="title" target="_blank" rel="noopener noreferrer"></a>
            <span id="game-appid" class="meta"></span>
            <span id="queue-pos" class="meta"></span>
          </div>
        </div>
      </div>
      <p id="queue-intro" class="intro">Choose list and collection, then click Go.</p>
      <div class="setup-panel">
        <label>
          <span>List</span>
          <select id="list-select">
            <option value="inbox">Inbox</option>
            <option value="wishlist">Wishlist</option>
            <option value="follow">Follow</option>
            <option value="confirm">Confirm</option>
            <option value="wf">W+F</option>
            <option value="cf">C+F</option>
          </select>
        </label>
        <label>
          <span>Collection</span>
          <select id="collection-select"></select>
        </label>
      </div>
      <section id="queue-filters-panel" class="queue-filters-panel">
        <details class="filter-group" open>
          <summary>Tags</summary>
          <div class="filter-content">
            <input id="queue-tag-search-input" type="search" placeholder="Search tags...">
            <div id="queue-tag-options" class="tag-options"></div>
            <button id="queue-tag-show-more-btn" type="button" class="small-btn">Show more</button>
          </div>
        </details>

        <details class="filter-group" open>
          <summary>Rating &amp; Reviews</summary>
          <div class="filter-content">
            <div class="range-header">
              <span id="queue-rating-min-label">0%</span>
              <span id="queue-rating-max-label">100%</span>
            </div>
            <div class="dual-range">
              <input id="queue-rating-min-range" type="range" min="0" max="100" step="1" value="0">
              <input id="queue-rating-max-range" type="range" min="0" max="100" step="1" value="100">
            </div>
            <div class="reviews-row">
              <input id="queue-reviews-min-input" type="number" min="0" step="1" value="0">
              <span>to</span>
              <input id="queue-reviews-max-input" type="number" min="0" step="1" value="" placeholder="max">
            </div>
          </div>
        </details>

        <details class="filter-group" open>
          <summary>Price &amp; Discount</summary>
          <div class="filter-content">
            <div class="reviews-row">
              <input id="queue-price-min-input" type="number" min="0" step="1" value="0">
              <span>to</span>
              <input id="queue-price-max-input" type="number" min="0" step="1" value="" placeholder="max">
            </div>
            <div class="range-header">
              <span id="queue-discount-min-label">0%</span>
              <span id="queue-discount-max-label">100%</span>
            </div>
            <div class="dual-range">
              <input id="queue-discount-min-range" type="range" min="0" max="100" step="1" value="0">
              <input id="queue-discount-max-range" type="range" min="0" max="100" step="1" value="100">
            </div>
          </div>
        </details>

        <details class="filter-group" open>
          <summary>Release Year</summary>
          <div class="filter-content">
            <label class="inline-toggle switch-toggle">
              <input id="queue-release-text-enabled" type="checkbox" checked>
              <span>TBA/Soon</span>
            </label>
            <div class="release-year-range-row">
              <label class="inline-toggle switch-toggle">
                <input id="queue-release-year-range-enabled" type="checkbox" checked>
              </label>
              <div id="queue-release-year-range-panel" class="release-year-range-panel">
                <div class="range-header">
                  <span id="queue-release-year-min-label">2010</span>
                  <span id="queue-release-year-max-label">2027</span>
                </div>
                <div class="dual-range">
                  <input id="queue-release-year-min-range" type="range" min="2010" max="2027" step="1" value="2010">
                  <input id="queue-release-year-max-range" type="range" min="2010" max="2027" step="1" value="2027">
                </div>
              </div>
            </div>
          </div>
        </details>

        <details class="filter-group" open>
          <summary>More Filters</summary>
          <div class="filter-content">
            <div id="queue-extra-filters-root"></div>
          </div>
        </details>
      </section>
      <p id="status" class="status"></p>
    </header>

    <section id="empty" class="empty hidden">No games for current source/filter.</section>
    <article id="queue-card" class="queue-card hidden">
      <div class="queue-body">
        <div class="queue-left">
          <div class="media-stage">
            <video id="media-video" class="media hidden" controls muted playsinline preload="none"></video>
            <img id="media-image" class="media hidden" alt="">
            <button id="media-prev-btn" class="media-nav-btn media-nav-prev" type="button" aria-label="Previous media">‹</button>
            <button id="media-next-btn" class="media-nav-btn media-nav-next" type="button" aria-label="Next media">›</button>
          </div>
        </div>
        <div id="queue-column-resize-handle" class="queue-column-resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize queue columns"></div>
        <div class="info">
          <a id="capsule-link" class="capsule-link" target="_blank" rel="noopener noreferrer">
            <img id="capsule-image" class="capsule-image" alt="">
          </a>
          <div class="actions">
            <button id="action-wishlist-btn" type="button">Confirm</button>
            <button id="action-follow-btn" type="button">Follow</button>
            <button id="action-wishlist-follow-btn" type="button">C*F</button>
            <button id="action-none-btn" type="button">None</button>
          </div>
          <p id="short-description" class="short-description">-</p>
          <div class="meta-grid">
            <p id="price-text" class="meta">Price: -</p>
            <p id="discount-text" class="meta">Discount: -</p>
            <p id="review-text" class="meta">Reviews: -</p>
            <p id="release-text" class="meta">Release: -</p>
          </div>
          <div id="tags-row" class="tags-row"></div>
          <label class="target">
            <span>Target</span>
            <input id="target-input" type="number" min="0" step="0.01" placeholder="">
          </label>
          <div class="target-actions">
            <button id="action-demo-btn" type="button">DEMO</button>
          </div>
        </div>
      </div>
    </article>
  </main>
  <script src="collections-filters.js"></script>
  <script src="steam-fetch.js"></script>
  <script src="queue.js"></script>
</body>
</html>
